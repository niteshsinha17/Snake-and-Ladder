<!DOCTYPE html>

    <div class="first-screen">

        </div>

          </div>
          <div style="flex-direction: row;" class="row">
            <div class="col-md-6">
              <div>

                  class="player-input inp1"

                />
              </div>
            </div>
            <div class="col-md-6">
              <div>
                <input
                  class="player-input inp2"
                  placeholder="Second Player Name"
                />
              </div>
            </div>
          </div>
        </div>
        <div class="start-btn">Start</div>
      </div>
    </div>
    <div class="winner-box">
      <div class="winner"></div>
    </div>
    <div class="step-board playerS1">
      <ul id="first-player-board">
        <div class="playerBackdrop"></div>
        <li class="name">First Player</li>

    </div>
    <div class="step-board playerS2">
